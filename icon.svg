<!-- Source SVG for the PWA icon. A build step (scripts/build-icons.mjs) uses
     sharp to generate 192/512/1024 PNG variants at deploy time.
     Edit the letter or palette here to re-skin. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1c1e"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <text x="50%" y="58%" text-anchor="middle" dominant-baseline="middle"
        font-family="-apple-system, system-ui, sans-serif"
        font-weight="900" font-size="320" fill="#ff453a">C</text>
</svg>
